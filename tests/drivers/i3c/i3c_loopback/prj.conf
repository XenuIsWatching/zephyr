# I3C subsys, dual-role so one controller can be put in target mode.
CONFIG_I3C=y
CONFIG_I3C_DUAL_ROLE=y

# IBI on both sides — controller delivers IBI callbacks via workq.
CONFIG_I3C_USE_IBI=y
CONFIG_I3C_IBI_WORKQUEUE=y
CONFIG_I3C_IBI_MAX_PAYLOAD_SIZE=16

# Testing
CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=4096

# Logging — useful when debugging on real hardware
CONFIG_LOG=y
CONFIG_I3C_LOG_LEVEL_DBG=y

# Heap for the few cases that allocate transient buffers.
CONFIG_HEAP_MEM_POOL_SIZE=4096

# Bigger main stack — DAA + multiple back-to-back transfers in setup.
CONFIG_MAIN_STACK_SIZE=4096
